<title>Keyboarding Timed Writing App</title>

<style>
  /* ============================
     THEME A — LIGHT CLASSROOM
     ============================ */

  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    padding: 0;
    background: #f7f9fc;
    color: #222;
  }

  header {
    background: #ffffff;
    padding: 1.2rem 2rem;
    border-bottom: 2px solid #e3e7ef;
    text-align: center;
  }

  header h1 {
    margin: 0;
    font-size: 1.9rem;
    font-weight: 600;
    color: #2a4b8d;
  }

  main {
    max-width: 900px;
    margin: 2rem auto;
    background: #ffffff;
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }

  /* ============================
     FORM CONTROLS
     ============================ */

  label {
    font-weight: 600;
    display: block;
    margin-top: 1rem;
  }

  input[type="text"], select, textarea {
    width: 100%;
    padding: 0.7rem;
    margin-top: 0.4rem;
    border: 1px solid #cfd6e4;
    border-radius: 6px;
    font-size: 1rem;
  }

  textarea {
    height: 140px;
    resize: none;
    background: #fdfdfd;
  }

  /* ============================
     BUTTONS
     ============================ */

  .btn-row {
    margin-top: 1.5rem;
    display: flex;
    gap: 1rem;
  }

  button {
    padding: 0.7rem 1.4rem;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
  }

  #startBtn {
    background: #2a72d4;
    color: white;
  }

  #resetBtn {
    background: #d9534f;
    color: white;
  }

  #startBtn:disabled,
  #resetBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ============================
     PASSAGE DISPLAY
     ============================ */

  #passageBox {
    background: #f1f4fa;
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid #d7ddea;
    margin-top: 1rem;
    white-space: pre-wrap;
    line-height: 1.5;
  }

  /* ============================
     STATS GRID
     ============================ */

  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-top: 2rem;
  }

  .stat {
    background: #f1f4fa;
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid #d7ddea;
    text-align: center;
  }

  .stat span.value {
    display: block;
    margin-top: 0.4rem;
    font-size: 1.4rem;
    font-weight: 700;
    color: #2a4b8d;
  }

  /* ============================
     ERROR COLOR STYLES
     ============================ */

  .error-wrong {
    color: red;
    font-weight: bold;
  }

  .error-missing {
    color: blue;
    font-weight: bold;
    text-decoration: underline;
  }

  .error-extra {
    color: orange;
    font-weight: bold;
  }

  /* ============================
     TEACHER MODE TOGGLE
     ============================ */

  #teacherMode {
    margin-right: 0.4rem;
  }

  .teacher-toggle {
    margin-top: 1.5rem;

     TIMER DISPLAY
     ============================ */

  #timerDisplay {
    font-size: 1.6rem;
    font-weight: 700;
    color: #2a4b8d;
    text-align: center;
    margin-top: 1.5rem;

  remainingSeconds = totalSeconds;
  updateTimerDisplay();

  resetSession(false);
}

  const m = Math.floor(remainingSeconds / 60);
  const s = remainingSeconds % 60;
  timerDisplay.textContent =
    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function startTimer() {
  if (timerInterval) return;

  timerInterval = setInterval(() => {
    remainingSeconds--;
    if (remainingSeconds <= 0) {
      remainingSeconds = 0;
      updateTimerDisplay();
      stopTimer();
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;

  typingArea.contentEditable = "false";
  startBtn.disabled = false;
  resetBtn.disabled = false;

  updateResults();

const attempt = {
  ID: studentIdInput.value.trim(),
  Code: currentLesson.id,
  Lesson: currentLesson.name,
  Attempt: (attemptHistory[studentIdInput.value.trim()]?.length || 0) + 1,
  WPM: Number(grossWpmEl.textContent),
  Errors: Number(errorsEl.textContent),
  Time: Number(timeSecondsEl.textContent),
  Goal: currentLesson.goal,
  Text: typingArea.innerText,
  Timestamp: new Date().toISOString()
};

// FIXED: use attempt.ID instead of attempt.studentId
if (!attemptHistory[attempt.ID]) {
  attemptHistory[attempt.ID] = [];
}
attemptHistory[attempt.ID].push(attempt);

console.log("Attempt saved:", attempt);

// AUTO‑SUBMIT TO GOOGLE SHEETS
fetch("https://script.google.com/macros/s/AKfycbzjBC59L6rsSsxGDnxd8jjiYodd5dpA-lVmzAtlnvlpL1Lctazj0UEOV0TPSEb1hdPEcg/exec", {
  method: "POST",
  mode: "no-cors",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify(attempt)
});

}

/* ============================================================
   RESET SESSION
   ============================================================ */
function resetSession(clearText = true) {
  clearInterval(timerInterval);
  timerInterval = null;

  waitingForFirstKey = false;
  remainingSeconds = totalSeconds;
  updateTimerDisplay();

  if (clearText) typingArea.innerText = '';

  typingArea.contentEditable = "false";
  startBtn.disabled = false;
  resetBtn.disabled = true;

  charsTypedEl.textContent = '0';
  grossWpmEl.textContent = '0';
  errorsEl.textContent = '0';
  accuracyEl.textContent = '100';
  goalStatusEl.textContent = '–';
  goalStatusEl.style.color = '#2a4b8d';

  highlightedOutput.innerHTML = '';

  passageBox.style.visibility = 'visible';
}

function updateResults() {
  const typed = typingArea.innerText;
  const target = passageBox.innerText;

  const errors = countErrors(typed, target);
  highlightErrors(typed, target);

  updateStats(typed, errors);
}

/* ============================================================
   ALLIGN WORDS
   ============================================================ */
function alignWords(typedWords, targetWords) {
  const m = typedWords.length;
  const n = targetWords.length;

  const dp = Array.from({ length: m + 1 }, () =>
    Array(n + 1).fill(0)
  );

  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;

  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      const cost = typedWords[i - 1] === targetWords[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }

  let i = m, j = n;
  const aligned = [];

  while (i > 0 || j > 0) {
    if (i > 0 && dp[i][j] === dp[i - 1][j] + 1) {
      aligned.push({ type: "extra", typed: typedWords[i - 1], target: null });
      i--;
    } else if (j > 0 && dp[i][j] === dp[i][j - 1] + 1) {
      aligned.push({ type: "missing", typed: null, target: targetWords[j - 1] });
      j--;
    } else {
      const type =
        typedWords[i - 1] === targetWords[j - 1] ? "match" : "sub";
      aligned.push({
        type,
        typed: typedWords[i - 1],
        target: targetWords[j - 1]
      });
      i--;
      j--;
    }
  }

  return aligned.reverse();
}

/* ============================================================
   ERROR COUNTING (WORD-BASED)
   ============================================================ */
function countErrors(typed, target) {

  // ⭐ MUST be first
  const typedNormalized = typed.replace(/\n/g, " <RETURN> ");

  const spacePunctErrors = (typedNormalized.match(/\s+[.,!?;:]/g) || []).length;

  const typedClean  = typedNormalized.replace(/\s+([.,!?;:])/g, '$1');
  const typedWords  = typedClean.trim().split(/\s+/);
  const targetWords = target.trim().split(/\s+/);

  const aligned = alignWords(typedWords, targetWords);

  let errors = spacePunctErrors;

  aligned.forEach(a => {
    if (a.type !== "match") errors++;
  });

  return errors;
}

/* ============================================================
   MAP RAW WORDS
   ============================================================ */
function mapRawToClean(rawWords, cleanWords) {
  const map = [];
  let r = 0;

  for (let c = 0; c < cleanWords.length; c++) {
    // rawWords may contain split punctuation or space-before-period artifacts
    // so we advance rawWords until we find a raw word that matches the clean word
    while (r < rawWords.length && rawWords[r].replace(/\s+([.,!?;:])/g, '$1') !== cleanWords[c]) {
      r++;
    }
    map[c] = r;
    r++;
  }

  return map;
}

/* ============================================================
   HIGHLIGHT ERRORS (TEACHER MODE ONLY)
   ============================================================ */
function highlightErrors(typed, target) {
  // TEMP: always show highlights while we verify behavior
  // (you can restore the student-mode guard later)
  // if (!teacherModeChk.checked && timerInterval !== null && remainingSeconds > 0) {
  //   highlightedOutput.innerHTML = '';
  //   return;
  // }

  if (!typed || !target || typed.trim().length === 0) {
    highlightedOutput.innerHTML = '';
    return;
  }

  // ⭐ MUST be first
  const typedNormalized = typed.replace(/\n/g, " <RETURN> ");

  // Clean for alignment
  const typedClean   = typedNormalized.replace(/\s+([.,!?;:])/g, '$1');
  const rawWords     = typedNormalized.trim().split(/\s+/);
  const cleanWords   = typedClean.trim().split(/\s+/);
  const targetWords  = target.trim().split(/\s+/);

  const aligned = alignWords(cleanWords, targetWords);

  const parts = [];
  let rawIndex = 0;
  let cleanIndex = 0;

  aligned.forEach(step => {
    if (rawWords[rawIndex] === "<RETURN>") {
	  parts.push(`<span class="error-extra return-symbol">↵</span>`);
	  rawIndex++;
	  return;
    }
    if (step.type === 'match') {
      parts.push(rawWords[rawIndex]);
      rawIndex++;
      cleanIndex++;
    }
    else if (step.type === 'sub') {
      parts.push(`<span class="error-wrong">${rawWords[rawIndex]}</span>`);
      rawIndex++;
      cleanIndex++;
    }
    else if (step.type === 'extra') {
      parts.push(`<span class="error-extra">${rawWords[rawIndex]}</span>`);
      rawIndex++;
      cleanIndex++;
    }
    else if (step.type === 'missing') {
      parts.push(`<span class="error-missing">_</span>`);
    }
  });

  // ⭐ Append leftover raw words (fixes cutoff)
  while (rawIndex < rawWords.length) {
    parts.push(rawWords[rawIndex]);
    rawIndex++;
  }

  let html = parts.join(' ');
  html = html.replace(/\s+([.,!?;:])/g, m =>
    `<span class="error-wrong">${m}</span>`
  );

  highlightedOutput.innerHTML = html;
}

/* ============================================================
   UPDATE STATS
   ============================================================ */
function updateStats() {
  if (!currentLesson) return;

  const text = typingArea.innerText;
  const target = currentLesson.passage;

  // Characters typed
  const charsTyped = text.length;
  charsTypedEl.textContent = charsTyped;

  // Gross WPM
  const elapsedSeconds = totalSeconds - remainingSeconds;
  const minutes = elapsedSeconds > 0 ? elapsedSeconds / 60 : 1 / 60;
  const grossWpm = Math.round((charsTyped / 5) / minutes);
  grossWpmEl.textContent = isFinite(grossWpm) ? grossWpm : 0;

  // Errors
  const errors = countErrors(text, target);
  errorsEl.textContent = errors;

  // Accuracy
  const totalWords = target.trim().split(/\s+/).filter(w => w.length > 0).length;
  const accuracy = Math.max(0, Math.round(((totalWords - errors) / totalWords) * 100));
  accuracyEl.textContent = accuracy;

  // Goal check
  const [goalWpm, goalErrors] = currentLesson.goal
    .replace(' wpm/', ',')
    .replace('e', '')
    .split(',')
    .map(Number);

  if (grossWpm >= goalWpm && errors <= goalErrors) {
    goalStatusEl.textContent = 'Goal Met';
    goalStatusEl.style.color = 'green';
  } else {
    goalStatusEl.textContent = 'Not Met';
    goalStatusEl.style.color = 'red';
  }

  // Highlighting (Teacher Mode only)
  highlightErrors(text, target);
}


/* ============================================================
   EVENT HANDLERS
   ============================================================ */
startBtn.addEventListener('click', () => {
  if (!currentLesson) return;

  const studentId = studentIdInput.value.trim();
  if (!studentId) {
    alert('Please enter your Student ID before starting.');
    return;
  }

  typingArea.contentEditable = "true";
  typingArea.focus();
  waitingForFirstKey = true;

  startBtn.disabled = true;
  resetBtn.disabled = false;
});

// Reset button
resetBtn.addEventListener('click', () => {
  resetSession(true);
});

// Typing input handler
typingArea.addEventListener('input', () => {
  if (waitingForFirstKey) {
    waitingForFirstKey = false;
    startTimer();
  }
  updateStats();
});

// Teacher Mode toggle
teacherModeChk.addEventListener('change', () => {
  // Passage ALWAYS visible (Option A)
  passageBox.style.visibility = 'visible';

  // Highlighting only in Teacher Mode
  highlightErrors(typingArea.innerText, currentLesson?.passage || '');
});

/* ============================================================
   COPY / PASTE / SELECTION PROTECTION
   ============================================================ */

// 1. BLOCK PASTE INTO TYPING AREA
typingArea.addEventListener('paste', e => {
  e.preventDefault();
});

// 2. BLOCK COPY FROM PASSAGE
passageBox.addEventListener('copy', e => {
  e.preventDefault();
});

// 3. BLOCK RIGHT-CLICK CONTEXT MENU ON PASSAGE
passageBox.addEventListener('contextmenu', e => {
  e.preventDefault();
});

// 4. BLOCK TEXT SELECTION IN PASSAGE
passageBox.style.userSelect = 'none';
passageBox.style.webkitUserSelect = 'none';
passageBox.style.msUserSelect = 'none';

// 5. BLOCK KEYBOARD SHORTCUTS (Ctrl+C, Ctrl+V, Ctrl+X, Cmd+C/V/X)
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && ['c','v','x','a'].includes(e.key.toLowerCase())) {
    e.preventDefault();
  }
});

// 6. BLOCK DRAG-AND-DROP INTO TYPING AREA
typingArea.addEventListener('drop', e => {
  e.preventDefault();
});

// 7. BLOCK MIDDLE-CLICK PASTE (Linux / some browsers)
typingArea.addEventListener('mousedown', e => {
  if (e.button === 1) e.preventDefault();
});

typingArea.setAttribute('spellcheck', 'false');
typingArea.setAttribute('autocomplete', 'off');
typingArea.setAttribute('autocorrect', 'off');
typingArea.setAttribute('autocapitalize', 'off');

</script>
